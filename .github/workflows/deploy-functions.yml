name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy check-availability  --project-ref rxjcxbbdyewerpeeljjz --no-verify-jwt
          supabase functions deploy book-reservation    --project-ref rxjcxbbdyewerpeeljjz --no-verify-jwt
          supabase functions deploy lookup-reservation  --project-ref rxjcxbbdyewerpeeljjz --no-verify-jwt
          supabase functions deploy modify-reservation  --project-ref rxjcxbbdyewerpeeljjz --no-verify-jwt
          supabase functions deploy cancel-reservation  --project-ref rxjcxbbdyewerpeeljjz --no-verify-jwt
